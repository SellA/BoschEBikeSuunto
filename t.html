<!-- Bosch eBike - 5 fields, 2x3 grid, circular display -->
<uiView
  onLoad="
    var powerBarSub;
    var batteryBarSub;
    var noBikeSub;

    function updatePowerBar(level) {
      var i;
      for (i = 1; i <= 10; i++) {
        setStyle('#pow-fill-' + i, 'visibility', level >= i ? 'VISIBLE' : 'HIDDEN');
      }
    }

    function updateBatteryBar(level) {
      var i;
      for (i = 1; i <= 10; i++) {
        setStyle('#bat-fill-' + i, 'visibility', level >= i ? 'VISIBLE' : 'HIDDEN');
      }
    }

    function updateNoBike(active) {
      var visibility = active ? 'VISIBLE' : 'HIDDEN';
      setStyle('#no-bike-ring', 'visibility', visibility);
    }
  "
  onActivate="
    powerBarSub = $.subscribe('Zapp/{zapp_index}/Output/powerBarLevel', function(level) {
      updatePowerBar(level || 0);
    });
    batteryBarSub = $.subscribe('Zapp/{zapp_index}/Output/batteryBarLevel', function(level) {
      updateBatteryBar(level || 0);
    });
    noBikeSub = $.subscribe('Zapp/{zapp_index}/Output/noBike', function(active) {
      updateNoBike(active || 0);
    });
  "
  onDeactivate="
    $.unsubscribe(powerBarSub);
    $.unsubscribe(batteryBarSub);
    $.unsubscribe(noBikeSub);
  ">
  <div id="suuntoplus"
    style="--dbg: none;">
    <!--style="--dbg: 1px solid rgba(255, 80, 80, 0.7);">-->
    <!--              change to "none" to hide all debug borders          -->

    <div id="no-bike-ring" style="top:0px;left:0px;width:100%;height:100%;box-sizing:border-box;border:10px solid rgba(255, 0, 0,1.0);border-radius:50%;background-color:rgba(0,0,0,0);visibility:hidden;"></div>

    <!-- Power bar track -->
    <div style="top:62%;left:0%;width:10%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:59%;left:0%;width:11%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:56%;left:0%;width:12%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:53%;left:0%;width:13%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:50%;left:0%;width:14%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:47%;left:0%;width:15%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:44%;left:0%;width:16%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:41%;left:0%;width:17%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:38%;left:0%;width:18%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:35%;left:0%;width:19%;height:2%;background-color:rgba(255,255,255,0.12);"></div>

    <!-- Power bar fill -->
    <div id="pow-fill-1" style="top:62%;left:0%;width:10%;height:2%;background-color:rgba(0, 210, 150, 0.78);visibility:hidden;"></div>
    <div id="pow-fill-2" style="top:59%;left:0%;width:11%;height:2%;background-color:rgba(0, 210, 150, 0.78);visibility:hidden;"></div>
    <div id="pow-fill-3" style="top:56%;left:0%;width:12%;height:2%;background-color:rgba(80, 220, 70, 0.78);visibility:hidden;"></div>
    <div id="pow-fill-4" style="top:53%;left:0%;width:13%;height:2%;background-color:rgba(80, 220, 70, 0.78);visibility:hidden;"></div>
    <div id="pow-fill-5" style="top:50%;left:0%;width:14%;height:2%;background-color:rgba(210, 220, 30, 0.80);visibility:hidden;"></div>
    <div id="pow-fill-6" style="top:47%;left:0%;width:15%;height:2%;background-color:rgba(210, 220, 30, 0.80);visibility:hidden;"></div>
    <div id="pow-fill-7" style="top:44%;left:0%;width:16%;height:2%;background-color:rgba(245, 165, 35, 0.82);visibility:hidden;"></div>
    <div id="pow-fill-8" style="top:41%;left:0%;width:17%;height:2%;background-color:rgba(245, 165, 35, 0.82);visibility:hidden;"></div>
    <div id="pow-fill-9" style="top:38%;left:0%;width:18%;height:2%;background-color:rgba(245, 70, 55, 0.84);visibility:hidden;"></div>
    <div id="pow-fill-10" style="top:35%;left:0%;width:19%;height:2%;background-color:rgba(245, 70, 55, 0.84);visibility:hidden;"></div>

    <!-- Battery bar track -->
    <div style="top:62%;left:90%;width:10%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:59%;left:89%;width:11%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:56%;left:88%;width:12%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:53%;left:87%;width:13%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:50%;left:86%;width:14%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:47%;left:85%;width:15%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:44%;left:84%;width:16%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:41%;left:83%;width:17%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:38%;left:82%;width:18%;height:2%;background-color:rgba(255,255,255,0.12);"></div>
    <div style="top:35%;left:81%;width:19%;height:2%;background-color:rgba(255,255,255,0.12);"></div>

    <!-- Battery bar fill -->
    <div id="bat-fill-1" style="top:62%;left:90%;width:10%;height:2%;background-color:rgba(245, 70, 55, 0.84);visibility:hidden;"></div>
    <div id="bat-fill-2" style="top:59%;left:89%;width:11%;height:2%;background-color:rgba(245, 70, 55, 0.84);visibility:hidden;"></div>
    <div id="bat-fill-3" style="top:56%;left:88%;width:12%;height:2%;background-color:rgba(245, 165, 35, 0.82);visibility:hidden;"></div>
    <div id="bat-fill-4" style="top:53%;left:87%;width:13%;height:2%;background-color:rgba(245, 165, 35, 0.82);visibility:hidden;"></div>
    <div id="bat-fill-5" style="top:50%;left:86%;width:14%;height:2%;background-color:rgba(210, 220, 30, 0.80);visibility:hidden;"></div>
    <div id="bat-fill-6" style="top:47%;left:85%;width:15%;height:2%;background-color:rgba(210, 220, 30, 0.80);visibility:hidden;"></div>
    <div id="bat-fill-7" style="top:44%;left:84%;width:16%;height:2%;background-color:rgba(80, 220, 70, 0.78);visibility:hidden;"></div>
    <div id="bat-fill-8" style="top:41%;left:83%;width:17%;height:2%;background-color:rgba(80, 220, 70, 0.78);visibility:hidden;"></div>
    <div id="bat-fill-9" style="top:38%;left:82%;width:18%;height:2%;background-color:rgba(0, 210, 150, 0.78);visibility:hidden;"></div>
    <div id="bat-fill-10" style="top:35%;left:81%;width:19%;height:2%;background-color:rgba(0, 210, 150, 0.78);visibility:hidden;"></div>

    <!-- Vertical center divider -->
    <div class="cm-fg p-hc" style="top:0%;width:4px;height:65%;opacity:0.3;"></div>

    <!-- Horizontal separator 1 (between row 1 and 2) -->
    <div class="cm-fg" style="top:33%;left:0%;width:100%;height:4px;opacity:0.3;"></div>

    <!-- Horizontal separator 2 (between row 2 and 3) -->
    <div class="cm-fg" style="top:65%;left:0%;width:100%;height:4px;opacity:0.3;"></div>

    <!-- Row 1 left: Cadence -->
    <div class="sp-t-s" style="top:1%;left:calc(48% - 100%e);outline:var(--dbg);">Cad</div>
    <div class="sp-t-xs" style="top:8%;left:calc(48% - 100%e);outline:var(--dbg);">[rpm]</div>
    <div class="sp-d-m f-num" style="top:11%;left:calc(48% - 100%e);outline:var(--dbg);">
      <eval input="Zapp/{zapp_index}/Output/displayCadence" outputFormat="Count_Threedigits" default="--" />
    </div>

    <!-- Row 1 right: Speed -->
    <div class="sp-t-s" style="top:1%;left:52%;outline:var(--dbg);">Spd</div>
    <div class="sp-t-xs" style="top:8%;left:52%;outline:var(--dbg);">[km/h]</div>
    <div class="sp-d-m f-num" style="top:11%;left:52%;outline:var(--dbg);">
      <eval input="Zapp/{zapp_index}/Output/displaySpeed" outputFormat="Count_Threedigits" default="--" />
    </div>

    <!-- Row 2 left: Power -->
    <div class="sp-t-s" style="top:34%;left:calc(48% - 100%e);outline:var(--dbg);">Pow</div>
    <div class="sp-t-xs" style="top:41%;left:calc(48% - 100%e);outline:var(--dbg);">[w]</div>
    <div class="sp-d-m f-num" style="top:44%;left:calc(48% - 100%e);outline:var(--dbg);">
      <eval input="Zapp/{zapp_index}/Output/displayPower" outputFormat="Count_Threedigits" default="--" />
    </div>

    <!-- Row 2 right: Battery -->
    <div class="sp-t-s" style="top:34%;left:52%;outline:var(--dbg);">Bat</div>
    <div class="sp-t-xs" style="top:41%;left:52%;outline:var(--dbg);">[%]</div>
    <div class="sp-d-m f-num" style="top:44%;left:52%;outline:var(--dbg);">
      <eval input="Zapp/{zapp_index}/Output/displayBattery" outputFormat="Count_Threedigits" default="--" />
    </div>

    <!-- Row 3 center: Odometer -->
    <div class="sp-t-s" style="top:67%;left:calc(50% - 50%e);outline:var(--dbg);">Odo</div>
    <div class="sp-t-xs" style="top:74%;left:calc(50% - 50%e);outline:var(--dbg);">[km]</div>
    <div class="sp-d-m f-num" style="top:76%;left:calc(50% - 50%e);outline:var(--dbg);">
      <eval input="Zapp/{zapp_index}/Output/displayOdo" outputFormat="Count_Threedigits" default="--" />
    </div>
  </div>
</uiView>
