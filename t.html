<!-- Bosch eBike – 6 fields, 2×3 grid, circular display -->
<uiView>
  <div id="suuntoplus">

    <!-- Vertical center divider -->
    <div class="cm-fg p-hc" style="top:4%;width:2px;height:88%;opacity:0.3;"></div>

    <!-- Horizontal separator 1 (between row 1 and 2) -->
    <div class="cm-fg" style="top:37%;left:8%;width:84%;height:1px;opacity:0.3;"></div>

    <!-- Horizontal separator 2 (between row 2 and 3) -->
    <div class="cm-fg" style="top:65%;left:8%;width:84%;height:1px;opacity:0.3;"></div>

    <!-- Row 1 left: Speed -->
    <div style="top:calc(21% - 100%e);left:calc(28% - 50%e);">
      <span class="sp-t-s">VEL km/h</span>
    </div>
    <div style="top:calc(30% - 50%e);left:calc(28% - 50%e);">
      <span class="sp-d-s f-num">
        <eval input="Zapp/{zapp_index}/Output/speed" outputFormat="Count_Threedigits" default="--" />
      </span>
    </div>

    <!-- Row 1 right: Cadence -->
    <div style="top:calc(21% - 100%e);left:calc(72% - 50%e);">
      <span class="sp-t-s">CAD rpm</span>
    </div>
    <div style="top:calc(30% - 50%e);left:calc(72% - 50%e);">
      <span class="sp-d-s f-num">
        <eval input="Zapp/{zapp_index}/Output/cadence" outputFormat="Count_Threedigits" default="--" />
      </span>
    </div>

    <!-- Row 2 left: Power -->
    <div style="top:calc(49% - 100%e);left:calc(28% - 50%e);">
      <span class="sp-t-s">POT W</span>
    </div>
    <div style="top:calc(57% - 50%e);left:calc(28% - 50%e);">
      <span class="sp-d-s f-num">
        <eval input="Zapp/{zapp_index}/Output/power" outputFormat="Count_Fourdigits" default="--" />
      </span>
    </div>

    <!-- Row 2 right: Battery -->
    <div style="top:calc(49% - 100%e);left:calc(72% - 50%e);">
      <span class="sp-t-s">BAT %</span>
    </div>
    <div style="top:calc(57% - 50%e);left:calc(72% - 50%e);">
      <span class="sp-d-s f-num">
        <eval input="Zapp/{zapp_index}/Output/battery" outputFormat="Count_Threedigits" default="--" />
      </span>
    </div>

    <!-- Row 3 left: Odometer -->
    <div style="top:calc(72% - 100%e);left:calc(28% - 50%e);">
      <span class="sp-t-s">ODO km</span>
    </div>
    <div style="top:calc(80% - 50%e);left:calc(28% - 50%e);">
      <span class="sp-d-s f-num">
        <eval input="Zapp/{zapp_index}/Output/odo" outputFormat="Count_Fivedigits" default="--" />
      </span>
    </div>

    <!-- Row 3 right: Bike light state -->
    <div style="top:calc(72% - 100%e);left:calc(72% - 50%e);">
      <span class="sp-t-s">LIGHT</span>
    </div>
    <div style="top:calc(80% - 50%e);left:calc(72% - 50%e);">
      <span class="sp-d-s f-num">
        <eval input="Zapp/{zapp_index}/Output/light" outputFormat="Bool_OnOff" default="--" />
      </span>
    </div>

  </div>
</uiView>
