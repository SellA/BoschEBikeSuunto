<!-- Bosch eBike – 5 fields, 2×3 grid, circular display -->
<uiView>
  <div id="suuntoplus"
    style="--dbg: none;">
    <!--style="--dbg: 1px solid rgba(255, 80, 80, 0.7);">-->
    <!--              ↑ change to "none" to hide all debug borders          -->

    <!-- Vertical center divider -->
    <div class="cm-fg p-hc" style="top:0%;width:4px;height:66%;opacity:0.3;"></div>

    <!-- Horizontal separator 1 (between row 1 and 2) -->
    <div class="cm-fg" style="top:33%;left:0%;width:100%;height:4px;opacity:0.3;"></div>

    <!-- Horizontal separator 2 (between row 2 and 3) -->
    <div class="cm-fg" style="top:66%;left:0%;width:100%;height:4px;opacity:0.3;"></div>

    <!-- Row 1 left: Cadence -->
    <div class="sp-t-s" style="top:1%;left:calc(48% - 100%e);outline:var(--dbg);">Cad</div>
    <div class="sp-t-xs" style="top:8%;left:calc(48% - 100%e);outline:var(--dbg);">[rpm]</div>
    <div class="sp-d-s f-num" style="top:15%;left:calc(48% - 100%e);outline:var(--dbg);">
      <eval input="Zapp/{zapp_index}/Output/cadence" outputFormat="Count_Threedigits" default="--" />
    </div>

    <!-- Row 1 right: Speed -->
    <div class="sp-t-s" style="top:1%;left:52%;outline:var(--dbg);">Spd</div>
    <div class="sp-t-xs" style="top:8%;left:52%;outline:var(--dbg);">[km/h]</div>
    <div class="sp-d-s f-num" style="top:15%;left:52%;outline:var(--dbg);">
      <eval input="Zapp/{zapp_index}/Output/speed" outputFormat="Count_Threedigits" default="--" />
    </div>

    <!-- Row 2 left: Power -->
    <div class="sp-t-s" style="top:34%;left:calc(48% - 100%e);outline:var(--dbg);">Pow</div>
    <div class="sp-t-xs" style="top:41%;left:calc(48% - 100%e);outline:var(--dbg);">[w]</div>
    <div class="sp-d-s f-num" style="top:48%;left:calc(48% - 100%e);outline:var(--dbg);">
      <eval input="Zapp/{zapp_index}/Output/power" outputFormat="Count_Threedigits" default="--" />
    </div>

    <!-- Row 2 right: Battery -->
    <div class="sp-t-s" style="top:34%;left:52%;outline:var(--dbg);">Bat</div>
    <div class="sp-t-xs" style="top:41%;left:52%;outline:var(--dbg);">[%]</div>
    <div class="sp-d-s f-num" style="top:48%;left:52%;outline:var(--dbg);">
      <eval input="Zapp/{zapp_index}/Output/battery" outputFormat="Count_Threedigits" default="--" />
    </div>

    <!-- Row 3 center: Odometer -->
    <div class="sp-t-s" style="top:67%;left:calc(50% - 50%e);outline:var(--dbg);">Odo</div>
    <div class="sp-t-xs" style="top:74%;left:calc(50% - 50%e);outline:var(--dbg);">[km]</div>
    <div class="sp-d-s f-num" style="top:81%;left:calc(50% - 50%e);outline:var(--dbg);">
      <eval input="Zapp/{zapp_index}/Output/odo" outputFormat="Count_Threedigits" default="--" />
    </div>
  </div>
</uiView>
