<!-- Bosch eBike – 5 fields, 2×3 grid, circular display -->
<uiView>
  <div id="suuntoplus"
    style="--dbg: none;">
    <!--style="--dbg: 1px solid rgba(255, 80, 80, 0.7);">-->
    <!--              ↑ change to "none" to hide all debug borders          -->

    <!-- Vertical center divider -->
    <div class="cm-fg p-hc" style="top:0%;width:2px;height:66%;opacity:0.3;"></div>

    <!-- Horizontal separator 1 (between row 1 and 2) -->
    <div class="cm-fg" style="top:33%;left:0%;width:100%;height:1px;opacity:0.3;"></div>

    <!-- Horizontal separator 2 (between row 2 and 3) -->
    <div class="cm-fg" style="top:66%;left:0%;width:100%;height:1px;opacity:0.3;"></div>

    <!-- Row 1 left: Cadence -->
    <div style="top:1%;left:calc(48% - 100%e);display:flex;flex-direction:column;align-items:flex-end;outline:var(--dbg);">
      <span class="sp-t-s">Cad</span>
      <span class="sp-t-xs">[rpm]</span>
      <span class="sp-d-s f-num">
        <eval input="Zapp/{zapp_index}/Output/cadence" outputFormat="Count_Threedigits" default="--" />
      </span>
    </div>

    <!-- Row 1 right: Speed -->
    <div style="top:1%;left:calc(52%);display:flex;flex-direction:column;align-items:flex-start;outline:var(--dbg);">
      <span class="sp-t-s">Spd</span>
      <span class="sp-t-xs">[km/h]</span>
      <span class="sp-d-s f-num">
        <eval input="Zapp/{zapp_index}/Output/speed" outputFormat="Count_Threedigits" default="--" />
      </span>
    </div>

    <!-- Row 2 left: Power -->
    <div style="top:34%;left:calc(48% - 100%e);display:flex;flex-direction:column;align-items:flex-end;outline:var(--dbg);">
      <span class="sp-t-s">Pow</span>
      <span class="sp-t-xs">[w]</span>
      <span class="sp-d-s f-num">
        <eval input="Zapp/{zapp_index}/Output/power" outputFormat="Count_Threedigits" default="--" />
      </span>
    </div>

    <!-- Row 2 right: Battery -->
    <div style="top:34%;left:calc(52%);display:flex;flex-direction:column;align-items:flex-end;outline:var(--dbg);">
      <span class="sp-t-s">Bat</span>
      <span class="sp-t-xs">[%]</span>
      <span class="sp-d-s f-num">
        <eval input="Zapp/{zapp_index}/Output/battery" outputFormat="Count_Threedigits" default="--" />
      </span>
    </div>

    <!-- Row 3 center: Odometer -->
    <div style="top:67%;left:calc(50% - 50%e);display:flex;flex-direction:column;align-items:center;text-align:center;outline:var(--dbg);">
      <span class="sp-t-s">Odo</span>
      <span class="sp-t-xs">[km]</span>
      <span class="sp-d-s f-num">
        <eval input="Zapp/{zapp_index}/Output/odo" outputFormat="Count_Threedigits" default="--" />
      </span>
    </div>

  </div>
</uiView>
